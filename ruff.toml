# Ruff linter/formatter configuration for Strata pipeline
target-version = "py310"  # Blender 4.0+ bundles Python 3.10+
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",    # line too long — handled by formatter
    "SIM108",  # ternary operator — prefer explicit if/else for clarity
    "RUF002",  # ambiguous unicode in docstrings (en dashes are intentional)
    "RUF003",  # ambiguous unicode in comments (en dashes are intentional)
]

[lint.per-file-ignores]
"run_*.py" = ["E402"]  # sys.path manipulation must precede local imports
"mesh/scripts/*.py" = ["E402"]  # sys.path manipulation for Blender invocation

[lint.isort]
known-third-party = ["bpy", "bpy_extras", "mathutils", "bmesh", "cv2", "numpy", "PIL"]

[format]
quote-style = "double"
