# Run 29 seg — Run 28 hyperparams + cleaned labels via stricter quality filter
#
# Only runs if Run 28 underperforms and we want to test whether noisy
# labels in flux_diverse_clean (and to a lesser extent sora_diverse /
# gemini_diverse) are the bottleneck.
#
# Audit on April 22 (scripts/audit_labels.py) found:
#   - flux_diverse_clean: 15.2% head-below-torso (anatomically impossible)
#   - sora_diverse:        3.9% head-below-torso
#   - gemini_diverse:      5.4% head-below-torso
#   - gemini_li_converted (hand labels): 2.4% — real edge cases only
#
# This run applies --drop-head-below-torso in quality filter, removing
# ~290 clearly-bad labels in flux alone. Everything else is identical
# to Run 28 (Run 20 hyperparams + gemini_diverse + softening on).

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/vroid_cc0"
    - "./data_cloud/meshy_cc0_restructured"
    - "./data_cloud/gemini_li_converted"
    - "./data_cloud/cvat_annotated"
    - "./data_cloud/sora_diverse"
    - "./data_cloud/flux_diverse_clean"
    - "./data_cloud/gemini_diverse"
  frozen_splits_file: "./data_cloud/frozen_val_test.json"
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    cvat_annotated: 10.0
    sora_diverse: 4.0
    gemini_li_converted: 3.0
    flux_diverse_clean: 2.5
    vroid_cc0: 2.5
    gemini_diverse: 2.0
    meshy_cc0_textured: 1.5
    humanrig: 0.5

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 16
  num_workers: 8
  epochs: 20                    # match Run 20
  optimizer: "adamw"
  learning_rate: 1.0e-5         # match Run 20
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 0

loss:
  segmentation_weight: 1.0
  depth_weight: 0.2
  normals_weight: 0.2
  confidence_weight: 0.1
  label_smoothing: 0.0
  boundary_softening_radius: 2

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 10
  early_stopping_metric: "val/miou"
