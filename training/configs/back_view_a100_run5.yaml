# Back View Model — Run 5
#
# Key changes from run 4:
#   - PatchGAN adversarial loss (weight 0.1) — sharper outputs
#   - Stronger augmentation (color jitter 0.3, random erasing)
#   - Resume from run 4 checkpoint (val/l1 ~0.215)
#   - Same data: ~3,049 pairs

model:
  type: "unet"
  in_channels: 8     # front RGBA + 3/4 RGBA
  out_channels: 4    # back RGBA

data:
  dataset_dirs:
    - "./data/training/back_view_pairs_merged"
    - "./data/training/back_view_pairs_unrigged"
    - "./data/training/back_view_pairs_new"
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.85, val: 0.10, test: 0.05}

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.05}

training:
  batch_size: 8
  num_workers: 8
  epochs: 200
  optimizer: "adam"
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 5

loss:
  l1_weight: 1.0
  perceptual_weight: 0.1
  palette_weight: 0.05
  gan_weight: 0.01

checkpointing:
  save_dir: "./checkpoints/back_view"
  early_stopping_patience: 30
  early_stopping_metric: "val/l1"
