# Lean A100 config — core datasets only for fast fine-tuning baseline
# ~13K examples (only datasets with weight annotations)
# Est. time: ~20min on A100
model:
  num_features: 31
  num_bones: 20

data:
  dataset_dirs:
    - "./data_cloud/humanrig"            # HumanRig: 11,434 with skinning weights
    - "./data_cloud/segmentation"        # Mixamo: 1,598 with weights
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  max_vertices: 2048

training:
  batch_size: 64
  num_workers: 8
  epochs: 60                             # Fine-tuning converges faster
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 3

loss:
  weight_loss_weight: 1.0
  confidence_weight: 0.5

checkpointing:
  save_dir: "./checkpoints/weights"
  early_stopping_patience: 15
  early_stopping_metric: "val/mae"
