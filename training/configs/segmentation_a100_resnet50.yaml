# ResNet-50 backbone — largest capacity option for 22-class seg + depth + normals
# ResNet-50 (~24M params) via torchvision's DeepLabV3.
# Proven architecture for semantic segmentation — torchvision DeepLabV3 was designed
# with ResNet backbones. Higher capacity than EfficientNet-B3 but also heavier.
#
# Training from ImageNet-pretrained ResNet-50 backbone (no seg checkpoint resume).
# Same datasets as seg+meshy run.
#
# Target: mIoU > 0.50

model:
  backbone: "resnet50"
  num_classes: 22
  pretrained_backbone: true   # ImageNet pretrained (fresh seg heads)

data:
  dataset_dirs:
    - "./data_cloud/humanrig"                  # HumanRig T-pose: 11,434 GT 22-class
    - "./data_cloud/vroid_cc0"                 # VRoid CC0: 1,386 GT 22-class
    - "./data_cloud/meshy_cc0_textured"        # Meshy CC0 textured: 15,281 GT 22-class
    - "./data_cloud/anime_seg"                 # anime_seg: ~14K, existing masks
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    humanrig: 3.0
    vroid_cc0: 3.0
    meshy_cc0_textured: 2.0
    anime_seg: 1.0

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 16                                # Smaller batch — ResNet-50 uses more VRAM
  num_workers: 8
  epochs: 80                                    # Training from scratch (no resume)
  optimizer: "adamw"
  learning_rate: 1.0e-4                         # Higher LR — training from scratch
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 5

loss:
  segmentation_weight: 1.0
  depth_weight: 0.5
  normals_weight: 0.5
  confidence_weight: 0.1
  label_smoothing: 0.03

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 15
  early_stopping_metric: "val/miou"
