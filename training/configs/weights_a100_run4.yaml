# Run 4 — weight prediction config
# Key change: split_loader fix now discovers UniRig nested views
# Expected: 11,434 humanrig + 14,950 unirig = ~26,384 examples (vs run 3's humanrig-only)

model:
  num_features: 31
  num_bones: 20

data:
  dataset_dirs:
    - "./data_cloud/humanrig"            # 11,434 with skinning weights
    - "./data_cloud/unirig"              # ~14,950 with skinning weights (fixed discovery)
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  max_vertices: 2048

training:
  batch_size: 64
  num_workers: 8
  epochs: 100
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 3

loss:
  weight_loss_weight: 1.0
  confidence_weight: 0.5

checkpointing:
  save_dir: "./checkpoints/weights"
  early_stopping_patience: 15
  early_stopping_metric: "val/mae"
