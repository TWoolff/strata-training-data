# Lean A100 config — core datasets for fast fine-tuning baseline
# ~180K+ examples with Strata joint schema (includes diverse Danbooru + fbanimehq)
# Est. time: ~3-4h on A100 (with early stopping)
model:
  backbone: "mobilenet_v3_large"
  num_joints: 20
  pretrained_backbone: true              # Fine-tune from ImageNet weights

data:
  dataset_dirs:
    - "./data_cloud/segmentation"        # Mixamo: 1,598 pipeline dict joints
    - "./data_cloud/humanrig"            # HumanRig: 11,434 list-format joints
    - "./data_cloud/anime_seg"           # anime_seg: 14,578 RTMPose-enriched joints
    - "./data_cloud/fbanimehq"           # FBAnimeHQ: 101K full-body anime with joints
    - "./data_cloud/danbooru_diverse"    # Danbooru diverse: ~50K male/diverse body/skin with joints
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  geo_noise_std: 0.03

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.2, contrast: 0.2, saturation: 0.2, hue: 0.05}

training:
  batch_size: 64
  num_workers: 8
  epochs: 40                             # Fine-tuning converges faster
  optimizer: "adam"
  learning_rate: 1.0e-3                  # Lower LR for fine-tuning
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 3

loss:
  offset_weight: 1.0
  presence_weight: 1.0
  confidence_weight: 0.5

checkpointing:
  save_dir: "./checkpoints/joints"
  early_stopping_patience: 10
  early_stopping_metric: "val/mean_offset_error"
