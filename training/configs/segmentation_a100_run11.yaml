# Run 11 seg — Fine-tune from run 10 best checkpoint
# Key insight: runs 8-10 all peak at epoch 1 (low warmup LR) then degrade as
# LR climbs. Fix: treat this as fine-tuning with a flat low LR, no warmup.
#
# Changes from run 10:
#   - LR: 5e-5 → 1e-5 (flat, no warmup)
#   - warmup_epochs: 5 → 0
#   - scheduler: cosine → cosine with very low eta_min (effectively flat)
#   - depth_weight: 0.5 → 0.2 (reduce auxiliary head interference)
#   - normals_weight: 0.5 → 0.2 (same)
#   - early_stopping_patience: 20 → 30
#   - epochs: 80 → 60 (fine-tuning converges faster)
#
# Data: same as run 10 (flux_diverse added)

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/vroid_cc0"
    - "./data_cloud/meshy_cc0_textured"
    - "./data_cloud/gemini_li_converted"
    - "./data_cloud/cvat_annotated"
    - "./data_cloud/gemini_diverse"
    - "./data_cloud/flux_diverse"
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    cvat_annotated: 10.0
    flux_diverse: 4.0
    gemini_diverse: 4.0
    gemini_li_converted: 3.0
    vroid_cc0: 2.5
    humanrig: 2.0
    meshy_cc0_textured: 1.5

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 32
  num_workers: 8
  epochs: 60
  optimizer: "adamw"
  learning_rate: 1.0e-5   # Low flat LR for fine-tuning — warmup was causing peak-at-epoch-1
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 0         # No warmup — start at full LR immediately

loss:
  segmentation_weight: 1.0
  depth_weight: 0.2        # Reduced — auxiliary heads were competing with seg
  normals_weight: 0.2      # Same
  confidence_weight: 0.1
  label_smoothing: 0.03

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 30
  early_stopping_metric: "val/miou"
