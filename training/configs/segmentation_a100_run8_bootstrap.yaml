# Run 8 seg — Bootstrapped pseudo-labels + drop anime_seg
# Resume from run 7 checkpoint (0.3573 mIoU).
#
# Key changes from run 7:
#   - ADD gemini_diverse: 874 pseudo-labeled + auto-triaged illustrated characters (weight 4.0)
#   - DROP anime_seg: 32% rejection rate, noisy labels hurting training
#   - Resume from run 7 instead of run 5
#
# Data composition:
#   - gemini_diverse: 874 auto-accepted pseudo-labels from diverse illustrated chars (weight 4.0)
#   - cvat_annotated: 49 hand-annotated diverse illustrated characters (weight 10.0)
#   - gemini_li_converted: 694 expert-labeled diverse illustrated characters (weight 3.0)
#   - vroid_cc0: 1,386 GT 22-class VRoid characters
#   - humanrig: 11,434 GT 22-class T-pose 3D renders
#   - meshy_cc0_textured: 15,281 GT 22-class diverse 3D characters
#
# Target: mIoU > 0.42

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true              # ImageNet weights (fallback when no checkpoint)

data:
  dataset_dirs:
    - "./data_cloud/humanrig"            # HumanRig T-pose: 11,434 GT 22-class
    - "./data_cloud/vroid_cc0"           # VRoid CC0: 1,386 GT 22-class
    - "./data_cloud/meshy_cc0_textured"  # Meshy CC0 textured: 15,281 GT 22-class
    - "./data_cloud/gemini_li_converted" # Dr. Li: 694 expert-labeled diverse illustrated
    - "./data_cloud/cvat_annotated"      # CVAT manual: 49 hand-annotated diverse illustrated
    - "./data_cloud/gemini_diverse"      # Pseudo-labeled: 874 auto-triaged diverse illustrated
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    cvat_annotated: 10.0                 # Highest weight — hand-annotated diverse illustrated
    gemini_diverse: 4.0                  # Pseudo-labeled, auto-triaged — large diverse set
    gemini_li_converted: 3.0             # Expert annotations — diverse illustrated chars
    vroid_cc0: 2.5                       # Ground-truth 22-class, VRoid chars
    humanrig: 2.0                        # Ground-truth 22-class, but homogeneous 3D
    meshy_cc0_textured: 1.5              # Auto-rigged, diverse but noisy

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 32
  num_workers: 8
  epochs: 80
  optimizer: "adamw"
  learning_rate: 5.0e-5
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 5

loss:
  segmentation_weight: 1.0
  depth_weight: 0.5
  normals_weight: 0.5
  confidence_weight: 0.1
  label_smoothing: 0.03

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 20
  early_stopping_metric: "val/miou"
