# Run 5 — joints config
# Strategy: Retrain from scratch with 45K ground-truth posed examples
# Key changes from run 3:
#   - Add humanrig_posed: 45K examples with Blender raycast GT joints
#   - GT ratio jumps from ~19% to ~40% of training data
#   - Posed data covers dynamic poses (kicks, crawling, dancing, planking)
#   - Keep humanrig T-pose (34K GT) + RTMPose datasets (anime_seg, fbanimehq)
#
# Expected: mean_offset_error < 0.001 (improve from run 3's 0.001206)

model:
  backbone: "mobilenet_v3_large"
  num_joints: 20
  pretrained_backbone: true              # Fine-tune from ImageNet weights

data:
  dataset_dirs:
    - "./data_cloud/humanrig"            # HumanRig T-pose: 11,434 ground-truth joints
    - "./data_cloud/humanrig_posed"      # HumanRig posed: ~45K ground-truth (Blender raycast)
    - "./data_cloud/meshy_cc0"           # Meshy CC0 flat: ~7,700 with pipeline joints
    - "./data_cloud/meshy_cc0_textured"  # Meshy CC0 textured: ~8,200 with pipeline joints
    - "./data_cloud/anime_seg"           # anime_seg: 14,578 RTMPose-enriched joints
    - "./data_cloud/fbanimehq"           # FBAnimeHQ: ~101K full-body anime with joints
    - "./data_cloud/gemini_diverse"      # Gemini: 500+ pseudo-labeled joints
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  geo_noise_std: 0.03

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.2, contrast: 0.2, saturation: 0.2, hue: 0.05}
  random_rotation: 10
  random_scale: [0.9, 1.1]

training:
  batch_size: 64
  num_workers: 8
  epochs: 80
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 3

loss:
  offset_weight: 1.0
  presence_weight: 1.0
  confidence_weight: 0.5

checkpointing:
  save_dir: "./checkpoints/joints"
  early_stopping_patience: 15
  early_stopping_metric: "val/mean_offset_error"
