# Local config — diffusion-enhanced weight prediction (Model 4)
# Requires precomputed encoder features from segmentation model
# Est. time: ~1-2h on RTX 4070 Ti
model:
  num_features: 31
  num_bones: 20
  encoder_channels: 960               # MobileNetV3-Large backbone output

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/segmentation"
  encoder_features_dirs:
    - "./data_cloud/encoder_features"
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  max_vertices: 2048

training:
  batch_size: 16
  num_workers: 4
  epochs: 100
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 5

loss:
  weight_loss_weight: 1.0
  confidence_weight: 0.5

checkpointing:
  save_dir: "./checkpoints/diffusion_weights"
  early_stopping_patience: 20
  early_stopping_metric: "val/mae"
