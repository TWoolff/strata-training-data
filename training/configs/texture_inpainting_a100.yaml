# A100 config — ControlNet UV texture inpainting (Model 5)
# Fine-tunes a ControlNet on SD 1.5 Inpainting for UV gap filling.
# ControlNet is conditioned on UV position + normal maps (6 channels).
# Est. time: ~4-6h on A100 40GB

model:
  base_model: "runwayml/stable-diffusion-inpainting"
  controlnet_channels: 6  # position_xyz (3) + normal_xyz (3)
  freeze_sd: true

data:
  dataset_dirs:
    - "./data_cloud/texture_pairs"
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}

augmentation:
  horizontal_flip: true
  vertical_flip: true
  color_jitter: {brightness: 0.1, contrast: 0.1, saturation: 0.1}
  random_mask_augmentation: true

training:
  batch_size: 2         # SD + ControlNet is memory-hungry (~20GB per batch)
  gradient_accumulation: 8  # effective batch 16
  num_workers: 8
  epochs: 100
  optimizer: "adamw"
  learning_rate: 1.0e-5
  weight_decay: 1.0e-2
  mixed_precision: "fp16"
  validate_every: 5     # full inference validation every N epochs
  val_inference_steps: 20

checkpointing:
  save_dir: "./checkpoints/texture_inpainting_controlnet"
  early_stopping_patience: 20
  early_stopping_metric: "val/l1"
