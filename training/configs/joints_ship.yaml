# Ship run — joints config
# Retrain from scratch with available datasets (no anime_seg, no humanrig_posed)
#
# Data composition:
#   - humanrig: 11,434 GT joints (Blender raycast, T-pose)
#   - meshy_cc0_textured: 15,281 with pipeline joints
#   - fbanimehq: ~101K full-body anime with RTMPose joints
#   - gemini_diverse: 874 pseudo-labeled joints
#   - gemini_li_converted: 694 expert-labeled
#   - cvat_annotated: 49 hand-annotated
#
# Previous best: 0.001206 mean_offset_error (run 3, 110K examples)

model:
  backbone: "mobilenet_v3_large"
  num_joints: 20
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/humanrig"            # HumanRig T-pose: 11,434 GT joints
    - "./data_cloud/meshy_cc0_textured"  # Meshy CC0 textured: 15,281 pipeline joints
    - "./data_cloud/fbanimehq"           # FBAnimeHQ: ~101K RTMPose-enriched joints
    - "./data_cloud/gemini_diverse"      # Gemini diverse: 874 pseudo-labeled joints
    - "./data_cloud/gemini_li_converted" # Dr. Li: 694 expert-labeled
    - "./data_cloud/cvat_annotated"      # CVAT manual: 49 hand-annotated
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  geo_noise_std: 0.03

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.2, contrast: 0.2, saturation: 0.2, hue: 0.05}
  random_rotation: 10
  random_scale: [0.9, 1.1]

training:
  batch_size: 64
  num_workers: 8
  epochs: 80
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 3

loss:
  offset_weight: 1.0
  presence_weight: 1.0
  confidence_weight: 0.5

checkpointing:
  save_dir: "./checkpoints/joints"
  early_stopping_patience: 15
  early_stopping_metric: "val/mean_offset_error"
