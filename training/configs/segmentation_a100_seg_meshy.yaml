# Seg+Meshy run — add 15,281 meshy_cc0_textured GT examples
# Strategy: Resume from seg-only run checkpoint (clean CC0-only baseline)
#   - meshy_cc0_textured: 15,281 textured renders with GT 22-class masks (NEW)
#   - All other datasets same as seg-only
#   - Resume from seg-only checkpoint (NOT run 1 — run 1 used prohibited Mixamo/Live2D)
#
# Key changes from seg-only:
#   - meshy_cc0_textured added (was excluded due to flat dir structure — now restructured)
#   - gemini_diverse removed (SAM2 pseudo-labels failed — 13/698 usable)
#   - More training data: ~40K total (vs ~24K in seg-only)
#   - Meshy data weighted 2.0 (auto-rigged, lower quality than HumanRig/VRoid)
#
# Target: mIoU > 0.45 (on clean CC0-only data)

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: false

data:
  dataset_dirs:
    - "./data_cloud/humanrig"                  # HumanRig T-pose: 11,434 GT 22-class
    - "./data_cloud/vroid_cc0"                 # VRoid CC0: 1,386 GT 22-class
    - "./data_cloud/meshy_cc0_textured"        # Meshy CC0 textured: 15,281 GT 22-class (NEW)
    - "./data_cloud/anime_seg"                 # anime_seg: ~14K, existing masks
    # gemini_diverse EXCLUDED — SAM2 pseudo-labels failed (13/698 passed quality filter)
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    humanrig: 3.0
    vroid_cc0: 3.0
    meshy_cc0_textured: 2.0                    # Auto-rigged, textured — medium quality
    anime_seg: 1.0

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 32
  num_workers: 8
  epochs: 60                                   # Shorter — building on seg-only checkpoint
  optimizer: "adamw"
  learning_rate: 3.0e-5                        # Lower LR — fine-tuning existing model
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 3

loss:
  segmentation_weight: 1.0
  depth_weight: 0.5
  normals_weight: 0.5
  confidence_weight: 0.1
  label_smoothing: 0.03

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 15
  early_stopping_metric: "val/miou"
