model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true

data:
  dataset_dirs: ["./data_cloud/segmentation", "./data_cloud/live2d"]
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.2, contrast: 0.2, saturation: 0.2, hue: 0.05}
  random_rotation: 10
  random_scale: [0.9, 1.1]

training:
  batch_size: 32                       # A100 80GB can handle 32+ easily
  num_workers: 8                       # More workers for faster data loading
  epochs: 200
  optimizer: "adam"
  learning_rate: 4.0e-4                # Scale LR with batch size (4x batch → 4x LR)
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 5

loss:
  segmentation_weight: 1.0
  draw_order_weight: 0.5
  confidence_weight: 0.1

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 20
  early_stopping_metric: "val/miou"
