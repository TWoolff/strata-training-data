# Run 10 seg — Bootstrap round 3 with FLUX diverse data
# Resume from run 8 checkpoint (0.4721 mIoU).
#
# Key changes from run 8/9:
#   - ADD flux_diverse: ~1,844 FLUX-generated pseudo-labeled chars (weight 4.0)
#   - KEEP gemini_diverse: 874 run 7 pseudo-labels (weight 3.0, lowered — older model)
#   - All other datasets unchanged
#
# Data composition:
#   - flux_diverse: ~1,844 FLUX-generated, pseudo-labeled by run 8 model (weight 4.0)
#   - cvat_annotated: 49 hand-annotated diverse illustrated characters (weight 10.0)
#   - gemini_diverse: 874 auto-triaged pseudo-labels from run 7 model (weight 3.0)
#   - gemini_li_converted: 694 expert-labeled diverse illustrated characters (weight 3.0)
#   - vroid_cc0: 1,386 GT 22-class VRoid characters (weight 2.5)
#   - humanrig: 11,434 GT 22-class T-pose 3D renders (weight 2.0)
#   - meshy_cc0_textured: 15,281 GT 22-class diverse 3D characters (weight 1.5)
#
# Target: mIoU > 0.52

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/vroid_cc0"
    - "./data_cloud/meshy_cc0_textured"
    - "./data_cloud/gemini_li_converted"
    - "./data_cloud/cvat_annotated"
    - "./data_cloud/gemini_diverse"
    - "./data_cloud/flux_diverse"
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    cvat_annotated: 10.0
    flux_diverse: 4.0
    gemini_diverse: 3.0
    gemini_li_converted: 3.0
    vroid_cc0: 2.5
    humanrig: 2.0
    meshy_cc0_textured: 1.5

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 32
  num_workers: 8
  epochs: 80
  optimizer: "adamw"
  learning_rate: 5.0e-5
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 5

loss:
  segmentation_weight: 1.0
  depth_weight: 0.5
  normals_weight: 0.5
  confidence_weight: 0.1
  label_smoothing: 0.03

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 20
  early_stopping_metric: "val/miou"
