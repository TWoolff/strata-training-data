# Lean A100 config — core datasets, longer training for production quality
# ~28K+ examples (13K 22-class seg + 15K confidence-only)
# Est. time: ~4-5h on A100 (with early stopping)
model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true              # Fine-tune from ImageNet weights

data:
  dataset_dirs:
    - "./data_cloud/segmentation"        # Mixamo: 1,598 examples, 22-class + draw_order + joints
    - "./data_cloud/live2d"              # Live2D: 844 examples, 22-class + draw_order
    - "./data_cloud/humanrig"            # HumanRig: 11,434 examples, 22-class + joints + weights
    - "./data_cloud/unirig"              # UniRig: ~10K humanoid subset, 22-class seg masks
    - "./data_cloud/curated_diverse"     # Curated diverse: 748, binary fg → confidence + draw_order
    - "./data_cloud/anime_seg"           # anime_seg: 14K, binary fg → confidence only
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.2, contrast: 0.2, saturation: 0.2, hue: 0.05}
  random_rotation: 10
  random_scale: [0.9, 1.1]

training:
  batch_size: 32
  num_workers: 8
  epochs: 100                            # More room to converge with 10x more data
  optimizer: "adamw"                      # Decoupled weight decay for fine-tuning
  learning_rate: 1.0e-4                  # Lower LR for fine-tuning
  weight_decay: 1.0e-4                   # Stronger decay with AdamW (decoupled)
  scheduler: "cosine"
  warmup_epochs: 3

loss:
  segmentation_weight: 1.0
  draw_order_weight: 0.5
  confidence_weight: 0.1

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 20
  early_stopping_metric: "val/miou"
