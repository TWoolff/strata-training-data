model:
  num_features: 31               # 31-dim per-vertex feature vector
  num_bones: 20                   # 20 bones matching BONE_ORDER

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/segmentation"
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  max_vertices: 2048              # Zero-pad to this vertex count

training:
  batch_size: 16
  num_workers: 4
  epochs: 100
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 5

loss:
  weight_loss_weight: 1.0         # KL divergence for soft weight labels
  confidence_weight: 0.5          # BCE for per-vertex confidence

checkpointing:
  save_dir: "./checkpoints/weights"
  early_stopping_patience: 20
  early_stopping_metric: "val/mae"
