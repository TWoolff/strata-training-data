# Run 21 seg — Re-pseudo-label with run 20 model + fix neck regression
#
# Key changes from run 20:
#   - Re-pseudo-label ALL sora_diverse with run 20 model (0.6485 test mIoU)
#     → expect more images to pass quality filter (854 → ~1,200+)
#   - +291 new illustrated images (sora_diverse_new.tar)
#   - Fix neck/accessory regression: exclude classes 2 (neck) and 21 (hair_back)
#     from boundary softening
#   - Resume from run 20 checkpoint (0.6171 val mIoU)
#
# Data composition:
#   - cvat_annotated:       49   (wt 10.0)
#   - sora_diverse:      ~2,750+ (wt 4.0) — re-pseudo-labeled, more through filter
#   - gemini_li_converted:  694  (wt 3.0)
#   - flux_diverse_clean: 1,569  (wt 2.5)
#   - vroid_cc0:          1,386  (wt 2.5)
#   - meshy_cc0_textured: 15,281 (wt 1.5)
#   - humanrig:          ~45,738 (wt 0.5)

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/vroid_cc0"
    - "./data_cloud/meshy_cc0_restructured"
    - "./data_cloud/gemini_li_converted"
    - "./data_cloud/cvat_annotated"
    - "./data_cloud/sora_diverse"
    - "./data_cloud/flux_diverse_clean"
  frozen_splits_file: "./data_cloud/frozen_val_test.json"
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    cvat_annotated: 10.0
    sora_diverse: 4.0
    gemini_li_converted: 3.0
    flux_diverse_clean: 2.5
    vroid_cc0: 2.5
    meshy_cc0_textured: 1.5
    humanrig: 0.5

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 16
  num_workers: 8
  epochs: 20
  optimizer: "adamw"
  learning_rate: 1.0e-5
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 0

loss:
  segmentation_weight: 1.0
  depth_weight: 0.2
  normals_weight: 0.2
  confidence_weight: 0.1
  label_smoothing: 0.0
  boundary_softening_radius: 2

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 10
  early_stopping_metric: "val/miou"
