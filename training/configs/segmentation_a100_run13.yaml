# Run 13 seg — Add humanrig_posed GT data + toon pseudo-labels
#
# Key changes from run 12:
#   - ADD humanrig_posed: ~35,000 GT posed renders (13 poses × 3 angles × ~900 chars)
#     Massive boost to pose diversity — run 12 only had T-pose/A-pose GT data
#   - ADD toon_pseudo: ~10,800 pseudo-labeled toon-style renders (5 styles × 3 angles)
#     Closes illustrated style gap with diverse cel/ink/watercolor renders
#   - humanrig weight reduced to 1.0 (posed version covers it with more variety)
#   - Resume from run 12 best checkpoint
#   - lr=1e-5 flat, no warmup (confirmed correct for fine-tuning)
#
# Data composition:
#   - cvat_annotated:       49   hand-annotated diverse illustrated chars    (wt 10.0)
#   - sora_diverse:      1,056   Sora/Gemini, run 10 labels, aspect-fixed   (wt 4.0)
#   - gemini_li_converted:  694  Dr. Li expert labels                        (wt 3.0)
#   - flux_diverse_clean: 1,569  cleaned FLUX, run 10 labels, aspect-fixed   (wt 2.5)
#   - vroid_cc0:          1,386  GT 22-class VRoid chars                     (wt 2.5)
#   - humanrig_posed:   ~35,000  GT 22-class posed renders (13 poses × 3 angles) (wt 2.0)
#   - toon_pseudo:      ~10,800  pseudo-labeled toon renders (5 styles × 3 angles) (wt 2.0)
#   - meshy_cc0_textured: 15,281 GT 22-class diverse 3D chars               (wt 1.5)
#   - humanrig:          11,434  GT 22-class T-pose 3D renders               (wt 1.0)
#
# Target: mIoU > 0.55

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/humanrig_posed"
    - "./data_cloud/vroid_cc0"
    - "./data_cloud/meshy_cc0_textured"
    - "./data_cloud/gemini_li_converted"
    - "./data_cloud/cvat_annotated"
    - "./data_cloud/sora_diverse"
    - "./data_cloud/flux_diverse_clean"
    - "./data_cloud/toon_pseudo"
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    cvat_annotated: 10.0
    sora_diverse: 4.0
    gemini_li_converted: 3.0
    flux_diverse_clean: 2.5
    vroid_cc0: 2.5
    humanrig_posed: 0.5
    toon_pseudo: 2.0
    meshy_cc0_textured: 1.5
    humanrig: 1.0

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 32
  num_workers: 8
  epochs: 60
  optimizer: "adamw"
  learning_rate: 1.0e-5
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 0

loss:
  segmentation_weight: 1.0
  depth_weight: 0.2
  normals_weight: 0.2
  confidence_weight: 0.1
  label_smoothing: 0.03

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 30
  early_stopping_metric: "val/miou"
