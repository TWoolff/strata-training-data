# Run 13a seg — Run 12 mix + toon_pseudo only
#
# Strategy: minimal change from run 12 (0.5068 mIoU) to isolate toon_pseudo impact.
# humanrig_posed deferred to 13b pending better pseudo-labels.
#
# Data composition (run 12 unchanged):
#   - cvat_annotated:       49   hand-annotated diverse illustrated chars    (wt 10.0)
#   - sora_diverse:      1,279   Sora/Gemini, run 10 labels, aspect-fixed   (wt 4.0)
#   - gemini_li_converted:  694  Dr. Li expert labels                        (wt 3.0)
#   - flux_diverse_clean: 1,569  cleaned FLUX, run 10 labels, aspect-fixed   (wt 2.5)
#   - vroid_cc0:          1,386  GT 22-class VRoid chars                     (wt 2.5)
#   - humanrig:          11,434  GT 22-class T-pose 3D renders               (wt 2.0)
#   - toon_pseudo:       ~13,740 pseudo-labeled toon-style renders           (wt 1.0) NEW
#   - meshy_cc0_textured: 15,281 GT 22-class diverse 3D chars               (wt 1.5)
#
# Target: mIoU > 0.52

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/vroid_cc0"
    - "./data_cloud/meshy_cc0_textured"
    - "./data_cloud/gemini_li_converted"
    - "./data_cloud/cvat_annotated"
    - "./data_cloud/sora_diverse"
    - "./data_cloud/flux_diverse_clean"
    - "./data_cloud/toon_pseudo"
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    cvat_annotated: 10.0
    sora_diverse: 4.0
    gemini_li_converted: 3.0
    flux_diverse_clean: 2.5
    vroid_cc0: 2.5
    humanrig: 0.5
    toon_pseudo: 1.0
    meshy_cc0_textured: 1.5

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 32
  num_workers: 8
  epochs: 20
  optimizer: "adamw"
  learning_rate: 1.0e-5
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 0

loss:
  segmentation_weight: 1.0
  depth_weight: 0.2
  normals_weight: 0.2
  confidence_weight: 0.1
  label_smoothing: 0.03

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 10
  early_stopping_metric: "val/miou"
