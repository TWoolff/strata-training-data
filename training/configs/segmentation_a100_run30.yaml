# Run 30 seg — Ensemble pseudo-labels (Run 20 TTA + SAM 2.1 + joints)
#
# Only variable changed vs Run 29: illustrated datasets (gemini_diverse,
# sora_diverse, flux_diverse_clean) are pseudo-labeled via the ensemble
# pipeline (scripts/ensemble_pseudo_label.py) instead of single-pass Run 20.
#
# Ensemble components:
#   1. Run 20 TTA — 4 views (identity + hflip + ±5° rotate), probabilities
#      averaged, L/R class channels swapped for hflip. Typical lift on
#      public seg benchmarks: +0.01-0.02 mIoU on pseudo-label quality.
#   2. SAM 2.1 automatic mask generator — pixel-perfect boundary masks,
#      class labels assigned by majority vote from Run 20 TTA probs.
#      Expected +0.02-0.04 mIoU on pseudo-label quality.
#   3. Joints-consistency correction via convert_li_labels.convert_with_joints.
#      Fixes L/R swaps and torso split errors. +0.005-0.015.
#
# Combined expected lift on final trained model: +0.02-0.04 test mIoU
# over Run 29 (~0.640). Target: 0.66+ test.
#
# Training config identical to Run 29 for clean A/B comparison.

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/vroid_cc0"
    - "./data_cloud/meshy_cc0_restructured"
    - "./data_cloud/gemini_li_converted"
    - "./data_cloud/cvat_annotated"
    - "./data_cloud/sora_diverse"
    - "./data_cloud/flux_diverse_clean"
    - "./data_cloud/gemini_diverse"
  frozen_splits_file: "./data_cloud/frozen_val_test.json"
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    cvat_annotated: 10.0
    sora_diverse: 4.0
    gemini_li_converted: 3.0
    flux_diverse_clean: 2.5
    vroid_cc0: 2.5
    gemini_diverse: 2.0
    meshy_cc0_textured: 1.5
    humanrig: 0.5

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 16
  num_workers: 8
  epochs: 20
  optimizer: "adamw"
  learning_rate: 1.0e-5
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 0

loss:
  segmentation_weight: 1.0
  depth_weight: 0.2
  normals_weight: 0.2
  confidence_weight: 0.1
  label_smoothing: 0.0
  boundary_softening_radius: 2

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 10
  early_stopping_metric: "val/miou"
