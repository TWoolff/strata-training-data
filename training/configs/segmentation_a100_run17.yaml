# Run 17 seg — Fixed split + recovered sora_diverse + GT humanrig_posed
#
# Key changes from run 16:
#   - train_only_datasets: humanrig_posed excluded from val/test split (fixes regression)
#   - sora_diverse: 839 placeholder masks fixed → pseudo-labeled on A100 (~1,650+ usable)
#   - humanrig_posed: 81K GT Blender masks, train-only, weight 0.5
#   - Resume from run 16 (0.5808 mIoU)
#
# Data composition:
#   - cvat_annotated:       49   hand-annotated diverse illustrated chars    (wt 10.0)
#   - sora_diverse:      ~2,467  Sora/Gemini/ChatGPT chars (~975 newly pseudo-labeled) (wt 4.0)
#   - gemini_li_converted:  694  Dr. Li expert labels                        (wt 3.0)
#   - flux_diverse_clean: 1,569  cleaned FLUX chars                          (wt 2.5)
#   - vroid_cc0:          1,386  GT 22-class VRoid chars                     (wt 2.5)
#   - toon_pseudo:       ~6,317  pseudo-labeled toon renders (quality-filtered) (wt 1.0)
#   - humanrig_posed:   ~81,730  GT 22-class posed renders (TRAIN ONLY)      (wt 0.5)
#   - meshy_cc0_textured: 15,281 GT 22-class diverse 3D chars               (wt 1.5)
#   - humanrig:          ~45,738 GT 22-class T-pose renders                  (wt 0.5)
#
# Target: mIoU > 0.60

model:
  backbone: "mobilenet_v3_large"
  num_classes: 22
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/humanrig"
    - "./data_cloud/vroid_cc0"
    - "./data_cloud/meshy_cc0_textured"
    - "./data_cloud/gemini_li_converted"
    - "./data_cloud/cvat_annotated"
    - "./data_cloud/sora_diverse"
    - "./data_cloud/flux_diverse_clean"
    - "./data_cloud/toon_pseudo"
  frozen_splits_file: "./data_cloud/frozen_val_test.json"
  quality_filter: true
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}
  dataset_weights:
    cvat_annotated: 10.0
    sora_diverse: 4.0
    gemini_li_converted: 3.0
    flux_diverse_clean: 2.5
    vroid_cc0: 2.5
    toon_pseudo: 1.0
    meshy_cc0_textured: 1.5
    humanrig: 0.5

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.3, contrast: 0.3, saturation: 0.3, hue: 0.1}
  random_rotation: 15
  random_scale: [0.85, 1.15]

training:
  batch_size: 32
  num_workers: 8
  epochs: 20
  optimizer: "adamw"
  learning_rate: 1.0e-5
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 0

loss:
  segmentation_weight: 1.0
  depth_weight: 0.2
  normals_weight: 0.2
  confidence_weight: 0.1
  label_smoothing: 0.03

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 10
  early_stopping_metric: "val/miou"
