# Lean A100 config — ControlNet UV texture inpainting (Model 5)
# Shorter training run for testing/iteration.
# Est. time: ~2h on A100

model:
  base_model: "runwayml/stable-diffusion-inpainting"
  controlnet_channels: 6
  freeze_sd: true

data:
  dataset_dirs:
    - "./data_cloud/texture_pairs"
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}

augmentation:
  horizontal_flip: true
  vertical_flip: true
  color_jitter: {brightness: 0.1, contrast: 0.1, saturation: 0.1}
  random_mask_augmentation: true

training:
  batch_size: 2
  gradient_accumulation: 4  # effective batch 8
  num_workers: 8
  epochs: 30
  optimizer: "adamw"
  learning_rate: 1.0e-5
  weight_decay: 1.0e-2
  mixed_precision: "fp16"
  validate_every: 10
  val_inference_steps: 10

checkpointing:
  save_dir: "./checkpoints/texture_inpainting_controlnet"
  early_stopping_patience: 15
  early_stopping_metric: "val/l1"
