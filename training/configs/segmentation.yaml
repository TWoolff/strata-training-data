model:
  backbone: "mobilenet_v3_large"
  num_classes: 22                  # 20 body regions + background + accessory
  pretrained_backbone: true

data:
  dataset_dirs:
    - "./data_cloud/segmentation"
    - "./data_cloud/live2d"
    - "./data_cloud/humanrig"
    - "./data_cloud/anime_seg"
    - "./data_cloud/anime_instance_seg"
    - "./data_cloud/unirig"
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}

augmentation:
  horizontal_flip: true
  color_jitter: {brightness: 0.2, contrast: 0.2, saturation: 0.2, hue: 0.05}
  random_rotation: 10
  random_scale: [0.9, 1.1]

training:
  batch_size: 8
  num_workers: 4
  epochs: 200
  optimizer: "adam"
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 5

loss:
  segmentation_weight: 1.0
  depth_weight: 0.5
  normals_weight: 0.5
  confidence_weight: 0.1

checkpointing:
  save_dir: "./checkpoints/segmentation"
  early_stopping_patience: 20
  early_stopping_metric: "val/miou"
