model:
  type: "unet"
  in_channels: 8     # front RGBA + 3/4 RGBA
  out_channels: 4    # back RGBA

data:
  dataset_dirs: ["../data/training/back_view_pairs"]
  resolution: 512
  split_seed: 42
  split_ratios: {train: 0.8, val: 0.1, test: 0.1}

augmentation:
  horizontal_flip: true       # Flip all 3 views together
  color_jitter: {brightness: 0.1, contrast: 0.1, saturation: 0.1, hue: 0.02}

training:
  batch_size: 4               # U-Net at 512x512 is memory-heavy
  num_workers: 4
  epochs: 150
  optimizer: "adam"
  learning_rate: 2.0e-4
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 5

loss:
  l1_weight: 1.0
  perceptual_weight: 0.1
  palette_weight: 0.05        # Palette consistency with 3/4 view

checkpointing:
  save_dir: "./checkpoints/back_view"
  early_stopping_patience: 20
  early_stopping_metric: "val/l1"
